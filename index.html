<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Feliz Cumpleaños Ma🎂</title>

<style>
    body {
        margin: 0;
        font-family: 'Arial', sans-serif;
        text-align: center;
        background-color: #F5F5DC;
        color: black;
    }

    .contenedor {
        padding: 40px 20px;
    }

    /* TEXTO PRINCIPAL */
    .titulo {
        font-size: 60px;
        font-weight: bold;
        margin-bottom: 20px;
    }

    /* IMAGEN PRINCIPAL */
    .imagen-principal {
        width: 300px;
        border-radius: 20px;
        margin-bottom: 30px;
    }

    /* BLOQUE DE TEXTO */
    .mensaje {
        background: rgba(255,255,255,0.2);
        padding: 25px;
        border-radius: 20px;
        max-width: 600px;
        margin: auto;
        font-size: 20px;
        backdrop-filter: blur(10px);
    }

    /* SEGUNDA IMAGEN */
    .imagen-secundaria {
        width: 250px;
        margin-top: 30px;
        border-radius: 15px;
    }

    /* BOTÓN INTERACTIVO */
    .boton {
        margin-top: 40px;
        font-size: 50px;
        cursor: pointer;
        transition: transform 0.2s ease;
        display: inline-block;
    }

    .boton:active {
        transform: scale(1.3);
    }

</style>
</head>

<body>

<div class="contenedor">

    <!-- TEXTO GRANDE -->
    <div class="titulo">
        🎉 ¡Feliz Cumpleaños! 🎂
    </div>

    <!-- IMAGEN PRINCIPAL -->
    <img class="imagen-principal"
         src="https://images.unsplash.com/photo-1530103862676-de8c9debad1d"
         alt="Cumpleaños">

    <!-- MENSAJE -->
    <div class="mensaje">
        Hoy es un día muy especial 🎈<br><br>
        Espero que este nuevo año de vida esté lleno de felicidad,
        salud y muchos momentos inolvidables 💖<br><br>
        ¡Disfruta tu día al máximo! 🎁
    </div>

    <!-- SEGUNDA IMAGEN -->
    <img class="imagen-secundaria"
         src="https://images.unsplash.com/photo-1464349153735-7db50ed83c84"
         alt="Fiesta">

    <!-- BOTÓN INTERACTIVO -->
    <div class="boton" onclick="animarBoton(this)">
        🎈
    </div>

</div>

<script>
function animarBoton(elemento) {
    elemento.style.transform = "scale(1.5)";
    
    setTimeout(() => {
        elemento.style.transform = "scale(1)";
    }, 200);
}
</script>

</body>
</html>
